<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
  
  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="98" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  
  <!-- Code bracket decoration -->
  <path d="M 120 180 L 80 256 L 120 332" stroke="url(#textGrad)" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M 392 180 L 432 256 L 392 332" stroke="url(#textGrad)" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Main text -->
  <text x="256" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="180" font-weight="800" fill="url(#textGrad)" text-anchor="middle" letter-spacing="-8" filter="url(#glow)">CRD</text>
  
  <!-- Accent dot -->
  <circle cx="430" cy="290" r="12" fill="#e2e8f0" opacity="0.8"/>
</svg>
